<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>参考文献</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: #f5f7fa;
            color: #333;
            line-height: 1.6;
        }
        header {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            color: white;
            padding: 3rem 2rem 2rem;
            text-align: center;
        }
        header h1 {
            font-size: 2.2rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
        }
        header p {
            opacity: 0.8;
            font-size: 1.05rem;
        }
        .container {
            max-width: 960px;
            margin: 0 auto;
            padding: 1.5rem;
        }
        .controls {
            background: white;
            border-radius: 12px;
            padding: 1.2rem 1.5rem;
            margin-bottom: 1.5rem;
            box-shadow: 0 2px 8px rgba(0,0,0,0.06);
            display: flex;
            flex-wrap: wrap;
            gap: 0.8rem;
            align-items: center;
        }
        .search-box {
            flex: 1;
            min-width: 200px;
            padding: 0.6rem 1rem;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 1rem;
            transition: border-color 0.2s;
            outline: none;
        }
        .search-box:focus { border-color: #0f3460; }
        .stats {
            width: 100%;
            font-size: 0.85rem;
            color: #888;
            margin-top: 0.3rem;
        }
        .ref-list { list-style: none; }
        .ref-item {
            background: white;
            border-radius: 10px;
            padding: 1rem 1.3rem;
            margin-bottom: 0.6rem;
            box-shadow: 0 1px 4px rgba(0,0,0,0.04);
            font-size: 0.95rem;
            border-left: 4px solid transparent;
            transition: border-color 0.2s;
        }
        .ref-item { border-left-color: #3498db; }
        .ref-item mark {
            background: #fff3cd;
            padding: 0 2px;
            border-radius: 2px;
        }
        .no-results {
            text-align: center;
            padding: 3rem;
            color: #aaa;
            font-size: 1.1rem;
        }
        @media (max-width: 600px) {
            header { padding: 2rem 1rem 1.5rem; }
            header h1 { font-size: 1.6rem; }
            .container { padding: 1rem; }
        }
    </style>
</head>
<body>
    <header>
        <h1>References / 参考文献</h1>
        <p>共 <span id="total">0</span> 篇文献</p>
    </header>
    <div class="container">
        <div class="controls">
            <input type="text" class="search-box" id="search" placeholder="搜索作者、标题、期刊...">
            <div class="stats" id="stats"></div>
        </div>
        <ul class="ref-list" id="list"></ul>
    </div>
    <script src="data.js"></script>
    <script>
        const allRefs = [
            ...REFS.cn.map(t => ({ text: t, lang: 'cn' })),
            ...REFS.en.map(t => ({ text: t, lang: 'en' }))
        ];

        document.getElementById('total').textContent = allRefs.length;

        const searchInput = document.getElementById('search');
        const listEl = document.getElementById('list');
        const statsEl = document.getElementById('stats');

        function escapeHtml(s) {
            return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
        }

        function highlightText(text, query) {
            if (!query) return escapeHtml(text);
            const escaped = escapeHtml(text);
            const qEsc = query.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
            return escaped.replace(new RegExp(qEsc, 'gi'), m => `<mark>${m}</mark>`);
        }

        function render() {
            const q = searchInput.value.trim().toLowerCase();
            let filtered = allRefs;
            if (q) {
                filtered = filtered.filter(r => r.text.toLowerCase().includes(q));
            }
            statsEl.textContent = `显示 ${filtered.length} / ${allRefs.length} 条`;
            if (filtered.length === 0) {
                listEl.innerHTML = '<div class="no-results">没有找到匹配的文献</div>';
                return;
            }
            listEl.innerHTML = filtered.map(r =>
                `<li class="ref-item">${highlightText(r.text, searchInput.value.trim())}</li>`
            ).join('');
        }

        searchInput.addEventListener('input', render);
        render();
    </script>
</body>
</html>
